name: GradeScale_CI_CD

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Vitest
        run: npm run test

  check-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Run Frontend Tests
        run: cd frontend && npm run test

      - name: Build check (Frontend)
        run: cd frontend && npm run build

  deploy-backend:
    runs-on: ubuntu-latest
    needs: [test-backend, check-frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 🛠️ Set lowercase repository owner
        run: echo "REPO_OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER }}/grade-scale:latest

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Rollout Azure Container App
        run: |
          az containerapp update \
            --name aca-gradescale-api-dev \
            --resource-group rg-gradescale-dev \
            --image ghcr.io/${{ env.REPO_OWNER }}/grade-scale:latest \
            --revision-suffix rev${{ github.run_number }} \
            --debug

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [test-backend, check-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Deploy Frontend
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/frontend"
          output_location: "dist"
          app_build_command: "npm install && npm run build"
